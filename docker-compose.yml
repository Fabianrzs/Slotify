services:
  # ── SQL Server ─────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: slotify-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" -C -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api          # Build context is the api folder
      dockerfile: Dockerfile
    container_name: slotify-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DATABASE_AUTO_MIGRATE: "true"
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=SlotifyDb;
        User Id=sa;Password=${SQL_SA_PASSWORD};
        TrustServerCertificate=true;
      Cognito__Region: "${COGNITO_REGION}"
      Cognito__UserPoolId: "${COGNITO_USER_POOL_ID}"
      Cognito__ClientId: "${COGNITO_CLIENT_ID}"
      AllowedOrigins__0: "http://localhost:3001"
      AllowedOrigins__1: "http://localhost:3002"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  # ── Tenant App ─────────────────────────────────────────────────────────────
  tenant:
    build:
      context: .                   # Monorepo root (needed for pnpm-lock.yaml)
      dockerfile: apps/tenant/Dockerfile
    container_name: slotify-tenant
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8080"
      NEXT_PUBLIC_APP_URL: "http://localhost:3001"
      NEXT_PUBLIC_COGNITO_REGION: "${COGNITO_REGION}"
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      NEXT_PUBLIC_COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
      NEXT_PUBLIC_COGNITO_DOMAIN: "${COGNITO_DOMAIN}"
    ports:
      - "3001:3001"
    restart: unless-stopped

  # ── Consumer App ───────────────────────────────────────────────────────────
  consumer:
    build:
      context: .                   # Monorepo root (needed for pnpm-lock.yaml)
      dockerfile: apps/consumer/Dockerfile
    container_name: slotify-consumer
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8080"
      NEXT_PUBLIC_COGNITO_REGION: "${COGNITO_REGION}"
      NEXT_PUBLIC_COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      NEXT_PUBLIC_COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
    ports:
      - "3002:3002"
    restart: unless-stopped

volumes:
  sqlserver_data:
